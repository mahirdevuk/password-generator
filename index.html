<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Password Generator</title>
  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #2b2b2b;
  color: #00ff66;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e1e1e;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
  text-align: center;
  width: 350px;
}

h1 {
  margin-bottom: 20px;
  font-size: 28px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  outline: none;
  background: #111;
  color: #00ff66;
  margin-bottom: 20px;
  box-sizing: border-box;
  text-align: center;
}

button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: background 0.3s ease, transform 0.2s ease;
}

button:hover {
  background: #0056b3;
  transform: scale(1.03);
}
    body {
      margin: 0;
      font-family: Consolas, monospace;
      background-color: #2b2b2b;
      color: #00ff66;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background-color: #1f1f1f;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 15px;
      border: 1px solid #00ff66;
      border-radius: 6px;
      background-color: #111;
      color: #00ff66;
      text-align: center;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #00ff66;
      color: #111;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #00cc55;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Secure Password Generator</h1>
    <input type="text" id="passwordBox" readonly placeholder="Your password will appear here" />
    <button onclick="generatePassword()">Generate</button>
  </div>

  <script>
    function generatePassword() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
      let password = "";

      for (let i = 0; i < 12; i++) {
        const randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
      }

      document.getElementById("passwordBox").value = password;
    }
  </script>
</body>
</html>
